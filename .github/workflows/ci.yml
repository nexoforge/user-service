name: user-service CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Build and run unit tests
        run: ./mvnw -B verify -DskipITs
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  contract-guardian-gate:
    name: Contract Guardian Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: read
      pull-requests: write # needed to post/update the PR comment

    steps:
      - name: Checkout user-service
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout contract-guardian CLI
        uses: actions/checkout@v4
        with:
          repository: hoag-7/contract-guardian
          path: .cg-tool
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build CLI
        run: mvn package -DskipTests -q -f .cg-tool/pom.xml -pl contract-guardian-cli -am

      - name: Scan for breaking changes
        run: |
          java -jar .cg-tool/contract-guardian-cli/target/contract-guardian-cli-*.jar \
            scan --diff origin/${{ github.base_ref }}..HEAD \
            --reporter terminal \
            --reporter junit:cg-results/results.xml \
            --github-pr hoag-7/user-service#${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # required by GitHubPrReporter
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-guardian-results
          path: cg-results/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-test, contract-guardian-gate]
    # Only build the Docker image on pushes to main/develop (not on PRs).
    # contract-guardian-gate is skipped on push events, so allow 'skipped' as a valid result.
    if: always() && github.event_name == 'push' && needs.build-and-test.result == 'success' && (needs.contract-guardian-gate.result == 'success' || needs.contract-guardian-gate.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: |
            personal-finance/user-service:${{ steps.tag.outputs.tag }}
            personal-finance/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
